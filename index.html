<!DOCTYPE html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body class="body">
  <div class="header">
    <video autoplay muted loop >
      <source src="vid/header.mp4" type="video/mp4">
    </video>
    <div class="left">
      <img class="logoname" src="img/Berserk_manga-1.png">
    </div>
  </div>
  <div class="main">
    <div class="nav">
      <div>
        <img title="Home" class="icon" src="img/home.jpg">
      </div>
      <div>
        <img title="Manga" class="icon" src="img/manga.jpg">
      </div>  
      <div>
        <img title="Reviews" class="icon" src="img/review.jpg">
      </div>  
    </div> 
  <div class="search-container">    
      <input class="search" type="text"   placeholder="Search...">
      <button class="searchbtn"><span class="a">Search</span></button >

  <div class="block">
    <video class="back" autoplay muted loop >
      <source src="vid/back.mp4" type="video/mp4">
